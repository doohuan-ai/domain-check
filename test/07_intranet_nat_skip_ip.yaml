# 调用方法：
# domain-check --config /Users/REEF/Desktop/apps/domain-check/test/07_intranet_nat_skip_ip.yaml
# 侧重：NAT 失败策略为 skip_ip（继续后续出口）

urls:
  - "https://www.google.com"
  - "https://www.bing.com"
  - "https://www.yahoo.com"

router:
  host: "192.168.11.254"
  port: 22
  user: "replace_me"
  password: "replace_me"

nat:
  target_src: "192.168.11.115"

run:
  nat_failure_policy: skip_ip

output:
  excel_prefix: "t07_intranet_nat_skip"
