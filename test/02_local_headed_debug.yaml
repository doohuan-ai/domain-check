# 侧重：可视化排错（有头模式）
# 场景：你能肉眼看见页面打开过程，适合定位“看起来像成功其实失败”的问题
urls:
  - "https://www.reddit.com"
  - "https://x.com"

browser:
  headless: false
  tabs_batch_size: 1
  wait_until: load
  post_goto_settle_ms: 2200

logging:
  json_events_log: true

output:
  excel_prefix: "t02_headed_debug"
# 用例说明：
# - 侧重：可视化调试（有头模式）
# - 备注：用于观察真实页面行为、跳转、加载节奏

urls:
