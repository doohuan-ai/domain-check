# 调用方法：
# domain-check --config /Users/REEF/Desktop/apps/domain-check/test/04_random_surfer_scroll_only_dom.yaml --skip-router
# 侧重：仅滚动/鼠标移动（不点击），排除“点击导致跳转/挑战”的干扰。

urls:
  - "https://www.zhihu.com"
  - "https://www.csdn.net"

browser:
  headless: false
  wait_until: domcontentloaded
  tabs_batch_size: 1
  random_surfer_enabled: true
  random_surfer_budget_ms: 12000
  random_surfer_max_clicks: 0
  random_surfer_scroll: true
  random_surfer_scroll_passes: 5
  random_surfer_mouse_wiggle: true

logging:
  json_events_log: true

output:
  excel_prefix: "t04_random_scroll_dom"
