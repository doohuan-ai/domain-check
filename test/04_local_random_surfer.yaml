# 侧重：浏览器随机自动操作（random surfer）
# 场景：验证页面初次加载后，随机滚动/点击是否引发额外挑战或封禁
urls:
  - "https://www.youtube.com"
  - "https://www.bilibili.com"

browser:
  headless: false
  tabs_batch_size: 1
  random_surfer_enabled: true
  random_surfer_budget_ms: 12000
  random_surfer_max_clicks: 3
  random_surfer_scroll: true
  random_surfer_scroll_passes: 3
  random_surfer_mouse_wiggle: true

output:
  excel_prefix: "t04_random_surfer"
