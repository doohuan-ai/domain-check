# 侧重：截图预算 + 重试策略压测
# 场景：URL 多、截图预算有限时，验证任务不中断且结果可读
urls:
  - "https://www.google.com"
  - "https://www.bing.com"
  - "https://www.yahoo.com"
  - "https://www.wikipedia.org"
  - "https://www.reddit.com"

browser:
  headless: false
  tabs_batch_size: 2
  navigation_network_max_attempts: 4
  navigation_network_retry_delay_ms: 2000
  navigation_content_max_attempts: 2
  navigation_content_retry_delay_ms: 1800
  screenshot_on_success: true

output:
  excel_prefix: "t05_budget_retry"
  max_total_screenshot_bytes: 12000000
  embed_screenshot_max_height: 160
