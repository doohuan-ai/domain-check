# =============================================================================
# domain-check 极简配置模板（建议先用这个）
#
# 目标：只保留最常用参数，先跑通；高级参数在下方“高级区”按需取消注释。
# 使用：
#   domain-check --template-lite > config.lite.yaml
#   domain-check --config ./config.lite.yaml
# =============================================================================

# 1) 必填：待测业务 URL（浏览器会真实打开）
urls: []

# 2) 必填：路由器 SSH（若只做本机浏览器测试，可用 --local-browser 跳过）
router:
  host: ""
  user: ""
  password: ""
  # 常见可保留默认
  port: 22
  lo_interface: lo
  ssh_encoding: utf-8
  nat_settle_seconds: 8

# 3) 必填：NAT 规则中的 src-address
nat:
  target_src: ""

# 4) 常用：浏览器与重试
browser:
  headless: true
  goto_timeout_ms: 60000
  tabs_batch_size: 8
  navigation_network_max_attempts: 3
  navigation_content_max_attempts: 1
  screenshot_on_success: true

# 5) 常用：探针（出口线路信号）
probe:
  enabled: true
  timeout_ms: 8000
  urls:
    - "https://www.cloudflare.com/cdn-cgi/trace"

# 6) 常用：每条 URL 前置预检（线路健康度）
precheck:
  enabled: true
  dns: true
  tcp: true
  ping: false

# 7) 常用：输出
output:
  excel_prefix: domain_check
  dir: "."

