# =============================================================================
# domain-check 内置默认配置
#
# 合并规则：启动时用本文件与「--config 指定的 YAML」做深度合并；用户文件中出现的键
# 覆盖此处同路径的键；用户未写的键沿用本文件默认值。
#
# 命令示例：
#   domain-check --config ./config.yaml
#   domain-check --config ./minimal.yaml --skip-router   # 不 SSH / 不切 NAT，只测本机 Chrome
# 将本文件（含全部注释）打印到 stdout，便于复制为自有模板：
#   domain-check --template
#
# 正式巡检时，用户文件一般至少填写：urls、router.host、router.user、router.password、
# nat.target_src。其余可按需覆盖。
# =============================================================================

# -----------------------------------------------------------------------------
# urls：待测站点列表。支持 YAML 字符串列表；也可改为「|」多行块标量，每行一个 URL，
# 以 # 开头的行为注释。与下方 probe.urls（urllib 探针）相互独立。
# -----------------------------------------------------------------------------
urls: []

# -----------------------------------------------------------------------------
# router：通过 SSH 连接 MikroTik RouterOS，读取 loopback 公网 IP、执行 SNAT 切换。
# -----------------------------------------------------------------------------
router:
  # SSH 主机名或 IP（用户配置中必填，除非使用 --skip-router）
  host: ""
  # SSH 端口（1–65535；启动前由 validate_config_schema 校验）
  port: 22
  # SSH 登录名（必填，除非 --skip-router）
  user: ""
  # SSH 密码（必填，除非 --skip-router）
  password: ""
  # 公网地址所在接口名，用于 /ip address print 解析出口 IP 列表
  lo_interface: lo
  # exec_command 输出解码（避免中文/特殊字符接口名乱码）
  ssh_encoding: utf-8
  # 每次成功执行 NAT 相关命令后，休眠秒数再开始探针/浏览器（给连接跟踪收敛时间）
  nat_settle_seconds: 8

# -----------------------------------------------------------------------------
# nat：与 /ip firewall nat 中匹配 src-address 的规则对应；用于 set to-addresses。
# -----------------------------------------------------------------------------
nat:
  # 内网源地址（CPE/LAN 主机在防火墙 NAT 规则里的 src-address，用户配置必填）
  target_src: ""

# -----------------------------------------------------------------------------
# run：整轮编排策略（与单次 page 检测逻辑无关）。
# -----------------------------------------------------------------------------
run:
  # SSH/NAT 切换失败时：abort = 立即终止整轮；skip_ip = 跳过该出口，Excel 写「已跳过」
  # 占位行（不启动浏览器、不跑 urllib 探针），避免半份表被误读。
  nat_failure_policy: skip_ip

# -----------------------------------------------------------------------------
# logging：可观测性。开启后在与 Excel 同一次运行的子目录内追加 JSON 行文件。
# -----------------------------------------------------------------------------
logging:
  # 是否写入 json_events_filename
  json_events_log: false
  # 事件文件名（相对当次运行目录，如 domain_check_1234567890/events.jsonl）
  json_events_filename: events.jsonl

# -----------------------------------------------------------------------------
# browser：本机 Google Chrome + Playwright；多标签异步巡检、分批与重试参数均在此。
# -----------------------------------------------------------------------------
browser:
  # Playwright channel，本机 Chrome 一般为 chrome
  channel: chrome
  # Chrome 可执行文件绝对路径；空字符串表示由 Playwright 与系统默认路径解析
  chrome_path: ""
  # 启动参数 --incognito
  incognito: true
  # true = 无头（无窗口）；调试可改为 false
  headless: true
  # 单次 page.goto 超时（毫秒）；与 validate_config_schema 上下限一致
  goto_timeout_ms: 60000
  # Playwright wait_until：commit / domcontentloaded / load / networkidle
  # 默认用 networkidle（四者里通常最晚），以降低“刚打开就判定”的误差。
  wait_until: networkidle
  # HTTP 2xx 且规则通过时是否保存视口截图（非整页长图）
  screenshot_on_success: true
  viewport_width: 1280
  viewport_height: 720
  # 每批并行标签数：0 = 单批尽量跑满（仍受 max_concurrent_tabs 约束）；>0 则每批最多 N 个
  tabs_batch_size: 0
  # tabs_batch_size 为 0 时限制单批最大并发页签；0 = 不额外限制；大 URL 列表建议 8–32
  max_concurrent_tabs: 0
  # 上一批全部结束后，延迟毫秒再开下一批（多批时生效）
  tabs_batch_delay_ms: 0
  # --- 网络类重试：goto 阶段超时、连接错误等 ---
  navigation_network_max_attempts: 3
  navigation_network_retry_delay_ms: 3000
  # 每次网络重试前休眠 = delay × backoff^试次；1.0 表示固定间隔
  navigation_network_retry_backoff: 1.0
  # --- 内容类重试：已成功 goto 但分类为 HTTP 错误等需再次导航；验证墙/关键词不重试 ---
  navigation_content_max_attempts: 1
  navigation_content_retry_delay_ms: 2000
  # 同批内第 k 个 URL 晚 k×本毫秒再发起 goto；0 = 同批同时发起
  tab_stagger_ms: 150
  # 轻量反自动化启动参数（非 puppeteer stealth 全量）
  use_stealth_launch_args: true
  # 禁用 Chrome 扩展，减轻 ERR_BLOCKED_BY_CLIENT
  disable_chrome_extensions: true
  # 追加传给 Chrome 的 argv 列表，每项一个字符串
  extra_chrome_args: []
  # BCP 47 语言，如 zh-CN；空 = 不设置
  locale: ""
  # IANA 时区，如 Asia/Shanghai；空 = 不设置
  timezone_id: ""
  # 页面注入前清理 WebDriver/Selenium 遗留 window 属性
  inject_automation_cleanup_script: true
  # goto 返回后是否再等待 load（SPA 辅助）
  post_goto_try_load_state: true
  post_goto_load_state_timeout_ms: 30000
  # 再等固定毫秒后做正文检测与截图
  post_goto_settle_ms: 1500
  # 随机冲浪（仅异步路径；默认关）
  random_surfer_enabled: false
  random_surfer_budget_ms: 12000
  random_surfer_max_clicks: 3
  random_surfer_scroll: true
  random_surfer_scroll_passes: 3
  random_surfer_mouse_wiggle: true
  # 自定义 UA；null 使用浏览器默认
  user_agent: null

# -----------------------------------------------------------------------------
# access：HTTP 2xx 后的正文扫描（可选）；与「能否打开页面」分层判定。
# -----------------------------------------------------------------------------
access:
  # true 时扫描正文是否命中 block_keywords（易误判，按需开启）
  enable_body_keyword_check: false
  # 参与扫描的正文最大字符数
  body_text_max_chars: 20000
  block_keywords:
    - "access denied"
    - "forbidden"
    - "not available in your region"
    - "地区限制"
  # 命中则标为验证墙 challenge（不尝试绕过验证码）
  captcha_keywords:
    - "slide to verify"
    - "please slide"
    - "unusual traffic"
    - "verify you are human"
    - "captcha"
    - "人机验证"
    - "安全验证"

# -----------------------------------------------------------------------------
# probe：切换 NAT 成功后、打开浏览器前，用 urllib 对下列 URL 发 GET；结果写入 Excel
# 探针（urllib）与 urls 的浏览器检测结果分列，避免语义混淆。
# enabled 为 true 时必须在 urls 列表中至少配置一条探针地址（启动前校验）。
# -----------------------------------------------------------------------------
probe:
  enabled: false
  timeout_ms: 8000
  urls: []

# -----------------------------------------------------------------------------
# precheck：对「每条业务 URL」在 page.goto 之前做轻量网络预检（DNS/TCP/PING），结果写入
# Excel 的「线路健康度」「预检详情」列。它是线路信号，不替代浏览器真实性能与业务判定。
# -----------------------------------------------------------------------------
precheck:
  enabled: false
  # 是否做 DNS 解析检查（建议开）
  dns: true
  # 是否做 TCP 端口连通（建议开）
  tcp: true
  # 是否做 ICMP ping（很多网站禁 ping，建议默认关，只作参考）
  ping: false
  # ping 发包次数（仅 ping=true 生效）
  ping_count: 1
  # 单项检查超时毫秒
  timeout_ms: 1500
  # URL 无显式端口时，TCP 默认端口
  tcp_port: 443

# -----------------------------------------------------------------------------
# output：报告目录与 Excel / 嵌入图参数；max_total_screenshot_bytes 限制单次运行截图总字节。
# -----------------------------------------------------------------------------
output:
  # 报告根目录（相对进程 cwd）；其下创建 <excel_prefix>_<unix时间>/ 子目录
  dir: "."
  excel_prefix: domain_check
  embed_screenshot_max_width: 300
  embed_screenshot_max_height: 180
  data_row_height: 24
  # 截图累计字节上限；超出后仍检测 URL 但不再写新截图；0 = 不限制
  max_total_screenshot_bytes: 100000000
