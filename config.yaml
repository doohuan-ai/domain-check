# 精简示例：与包内 builtin_config.yaml 深度合并；未写项沿用内置默认值。
# 完整键与注释请运行：domain-check --template
#
# 完整 NAT 流程至少填写：urls、router（host/user/password 等）、nat.target_src
# 本机仅测浏览器：domain-check --config ./config.yaml --local-browser（此时主要填 urls）

urls:
  - "https://www.example.com"

router:
  host: "192.168.1.1"
  port: 22
  user: "admin"
  password: "请填写"

nat:
  target_src: "192.168.1.100"
