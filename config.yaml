# 示例：domain-test -c ./本文件.yaml（与内置深度合并）
# 带全部注释的模板：domain-test --print-template（与包内 builtin_config.yaml 一致）
# 最少在 -c 中补：urls、router.host/user/password、nat.target_src

# 待测 URL，直接写在 YAML 里（列表）；也可用多行字符串，每行一个 URL，# 开头为注释
urls:
  - "https://www.example.com"

router:
  # 路由器 SSH 地址（-c 必填）
  host: "192.168.11.254"
  port: 22100
  user: "your_router_user"
  # -c 必填；勿提交含真实密码的副本
  password: "your_router_password"
  lo_interface: lo
  ssh_encoding: utf-8
  nat_settle_seconds: 8

nat:
  target_src: "192.168.11.115"

browser:
  channel: chrome
  # chrome_path: "/usr/bin/google-chrome-stable"
  incognito: true
  headless: true
  goto_timeout_ms: 60000
  wait_until: domcontentloaded
  screenshot_on_success: true
  viewport_width: 1280
  viewport_height: 720
  # user_agent: "Mozilla/5.0 ..."

access:
  enable_body_keyword_check: false
  body_text_max_chars: 20000
  block_keywords:
    - "access denied"
    - "forbidden"
    - "not available in your region"
    - "地区限制"

output:
  dir: "."
  excel_prefix: domain_check
  embed_screenshot_max_width: 300
  embed_screenshot_max_height: 180
  data_row_height: 150
