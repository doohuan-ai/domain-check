# 示例：domain-test --config ./本文件.yaml（与内置深度合并）
# 带全部注释的模板：domain-test --template（与包内 builtin_config.yaml 一致）
# 最少在 --config 中补：urls、router.host/user/password、nat.target_src

# 待测 URL：可用块列表（每行 - "..."）或流式列表 urls: [ "a", "b" ]；也可用多行字符串，每行一个 URL
urls: [
    "https://accounts.x.ai/check-login?redirect=grok-com",
    "https://www.waterwipes.com",
    "https://app.navosagent.ai",
    "https://code.visualstudio.com",
    "https://youmind.com",
    "https://x.com",
    "https://yuid.com",
    "https://example.com",
    "https://Weprovideawebserviceontheexampledomainhoststoprovidebasicinformation.com"
]

router:
  # 路由器 SSH 地址（--config 必填）
  host: "192.168.11.254"
  port: 22100
  user: "your_router_user"
  # --config 必填；勿提交含真实密码的副本
  password: "your_router_password"
  lo_interface: lo
  ssh_encoding: utf-8
  nat_settle_seconds: 8

nat:
  target_src: "192.168.11.115"

browser:
  channel: chrome
  # chrome_path: "/usr/bin/google-chrome-stable"
  incognito: true
  headless: false
  goto_timeout_ms: 60000
  # SPA 多时可改为 load；仍建议配合 post_goto_settle_ms
  wait_until: domcontentloaded
  screenshot_on_success: true
  post_goto_try_load_state: true
  post_goto_settle_ms: 2000
  viewport_width: 1280
  viewport_height: 720
  # 每批并行标签数：0 表示一批内同时打开全部 URL；>0 则每批最多该数量，批与批之间见 tabs_batch_delay_ms
  tabs_batch_size: 0
  # 上一批全部结束后，延迟多少毫秒再启动下一批（仅当 URL 总数需多批时有效）
  tabs_batch_delay_ms: 0
  # 单 URL 导航失败（超时、网络、非 2xx 等，不含已判「受限」）时最多尝试次数
  navigation_max_attempts: 3
  # 重试前等待毫秒（再次 goto，重定向由 Playwright 自动跟随）
  navigation_retry_delay_ms: 3000
  # 同批内各 URL 错开启动导航的间隔（毫秒）；0=同时发起。一批含全部 URL 时建议保留小值防打满站点
  tab_stagger_ms: 150
  # locale: "zh-CN"
  # timezone_id: "Asia/Shanghai"
  # use_stealth_launch_args: true
  # inject_automation_cleanup_script: true
  # user_agent: "Mozilla/5.0 ..."

access:
  enable_body_keyword_check: false
  body_text_max_chars: 20000
  block_keywords:
    - "access denied"
    - "forbidden"
    - "not available in your region"
    - "地区限制"

output:
  dir: "."
  excel_prefix: domain_check
  embed_screenshot_max_width: 300
  embed_screenshot_max_height: 180
  data_row_height: 24
