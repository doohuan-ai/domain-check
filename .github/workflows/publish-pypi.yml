# 在 GitHub 仓库 Settings → Secrets → Actions 中配置 PYPI_API_TOKEN（PyPI API token）。
# 发布前请将 pyproject.toml 中 [project] version 与 git tag（如 v0.5.0）对齐。
# 推送 v* 标签或手动 Run workflow 会 build 并 twine upload。
# 私有源：见 README；可复制本文件另存 workflow，把 twine upload 改为 --repository-url 等参数。

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check artifacts
        run: twine check dist/*

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/* --non-interactive
