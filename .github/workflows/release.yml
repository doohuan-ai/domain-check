name: Build and Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        default: "v0.1.0"
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${TAG#v}" >> "${GITHUB_OUTPUT}"

      - name: Validate pyproject version matches tag
        shell: bash
        run: |
          PYPROJECT_VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          TAG_VERSION="${{ steps.vars.outputs.version }}"
          echo "pyproject version: ${PYPROJECT_VERSION}"
          echo "tag version: ${TAG_VERSION}"
          if [[ "${PYPROJECT_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "Version mismatch: pyproject.toml=${PYPROJECT_VERSION}, tag=${TAG_VERSION}"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify artifacts
        run: twine check dist/*

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS.txt
