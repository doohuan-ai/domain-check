# =============================================================================
# 当前配置模板，可复制改名为 config.yaml 后使用：domain-test --config path/to/config.yaml
# config.yaml 必填项：urls、host、user、password、target_src
# config.yaml 中未写的键沿用下列值；写入的键则覆盖同名键
# =============================================================================

# 待测域名列表：字符串列表；也可改为多行标量，每行一个域名，# 开头为行注释
urls: []

router:
  # 路由器 SSH 地址（--config 必填）
  host: ""
  # SSH 端口
  port: 22
  # SSH 用户名（--config 必填）
  user: ""
  # SSH 密码（--config 必填）
  password: ""
  # 公网 loopback 所在接口名，用于列出出口 IP
  lo_interface: lo
  # SSH 终端输出解码，防 /ip address print 乱码
  ssh_encoding: utf-8
  # 每次改 NAT 后等待秒数再测 URL
  nat_settle_seconds: 8

nat:
  # 做 SNAT 的内网源 IP（--config 必填）
  target_src: ""

# 编排策略：与浏览器检测解耦
run:
  # SSH/NAT 失败时：abort 终止整轮；skip_ip 跳过该出口并在 Excel 写「已跳过」占位行（不启动浏览器）
  nat_failure_policy: skip_ip

# 可观测性：与 Excel 同目录追加 JSON 行（每行一条事件，便于对照）
logging:
  json_events_log: false
  json_events_filename: events.jsonl

browser:
  # 本机 Chrome
  channel: chrome
  # Chrome 可执行文件绝对路径；空串表示按系统默认路径
  chrome_path: ""
  # 是否无痕
  incognito: true
  # 是否无头（后台无窗口）
  headless: true
  # 单次 page.goto 超时毫秒
  goto_timeout_ms: 60000
  # 传给 Playwright：domcontentloaded / load / networkidle 等
  wait_until: domcontentloaded
  # HTTP 成功时是否截图（仅浏览器视口可见区域，非整页滚动）
  screenshot_on_success: true
  # 视口宽（像素）
  viewport_width: 1280
  # 视口高（像素）
  viewport_height: 720
  # 每批并行标签数：0 表示一批内同时打开全部 URL；>0 则每批最多该数量，批与批之间见 tabs_batch_delay_ms
  tabs_batch_size: 0
  # tabs_batch_size 为 0 时：单批最多并发页签（0 表示不限制；大列表建议 8–32 防内存/磁盘尖峰）
  max_concurrent_tabs: 0
  # 上一批全部结束后，延迟多少毫秒再启动下一批（仅当 URL 总数需多批时有效）
  tabs_batch_delay_ms: 0
  # 兼容旧键：未单独写 navigation_network_* 时，回退到下列两项
  navigation_max_attempts: 3
  navigation_retry_delay_ms: 3000
  # 网络类（goto 超时、连接错误等）最大尝试次数与退避（指数因子，1.0=固定间隔）
  navigation_network_max_attempts: 3
  navigation_network_retry_delay_ms: 3000
  navigation_network_retry_backoff: 1.0
  # 内容类（已返回文档但 HTTP 非成功等，再次 goto）；验证墙/关键词命中不重试
  navigation_content_max_attempts: 1
  navigation_content_retry_delay_ms: 2000
  # 同一批内：第 k 个 URL 比第 0 个晚 k×本值（毫秒）再开始 goto；tabs_batch_size 为 0 时仍生效，避免瞬间打满目标站。0 表示不错开
  tab_stagger_ms: 150
  # 参考 aips-desktop BrowserManager：去掉 --enable-automation 并追加轻量反自动化参数（非 Node stealth 插件）
  use_stealth_launch_args: true
  # 禁用扩展，减轻 ERR_BLOCKED_BY_CLIENT（本机广告拦截等）
  disable_chrome_extensions: true
  # 追加 Chrome 命令行，例如 [ "--proxy-server=..." ]（慎用）
  extra_chrome_args: []
  # 浏览器语言，如 zh-CN；空串表示不设置
  locale: ""
  # IANA 时区，如 Asia/Shanghai；空串表示不设置
  timezone_id: ""
  # 每个页面注入前清理 Selenium/WebDriver 遗留 window 属性（与 aips setupAntiDetectionScripts 同源，不含 Canvas 噪声）
  inject_automation_cleanup_script: true
  # goto 后尽量再等浏览器 load 事件（SPA 在 domcontentloaded 后仍可能空白）；超时则继续
  post_goto_try_load_state: true
  post_goto_load_state_timeout_ms: 30000
  # 再等固定毫秒后做正文检测与截图，减轻「只截到转圈」；纯静态站可改小或 0
  post_goto_settle_ms: 1500
  # HTTP 2xx 且通过关键词检查后：随机滚动/点击若干可见链接再截图（慎用；仅异步巡检）
  random_surfer_enabled: false
  random_surfer_budget_ms: 12000
  random_surfer_max_clicks: 3
  random_surfer_scroll: true
  random_surfer_scroll_passes: 3
  random_surfer_mouse_wiggle: true
  # 自定义 User-Agent；null 表示使用浏览器默认
  user_agent: null

access:
  # true 时在 HTTP 2xx 也扫正文，命中 block_keywords 则判受限（易误判）
  enable_body_keyword_check: false
  # 参与扫描的正文最大字符数
  body_text_max_chars: 20000
  # 正文中出现任一子串则判受限（仅当 enable_body_keyword_check 为 true 时生效）
  block_keywords:
    - "access denied"
    - "forbidden"
    - "not available in your region"
    - "地区限制"
  # HTTP 2xx 时扫正文，命中则判为「验证墙」（不尝试绕过验证码）
  captcha_keywords:
    - "slide to verify"
    - "please slide"
    - "unusual traffic"
    - "verify you are human"
    - "captcha"
    - "人机验证"
    - "安全验证"

# 切换 NAT 后、开浏览器前：urllib 探针（与下方浏览器测的 urls 分离）；Excel「探针状态」「出口探针详情」列
probe:
  enabled: false
  timeout_ms: 8000
  urls: []
  # 示例（按需取消注释）:
  # urls:
  #   - "https://www.cloudflare.com/cdn-cgi/trace"

output:
  # 报告根目录（相对 cwd）；其下会创建 <excel_prefix>_<时间戳>/（与 xlsx 同名前缀）
  dir: "."
  # Excel 文件名前缀，实际为 前缀_时间戳.xlsx
  excel_prefix: domain_check
  # 嵌入截图：固定高度（像素），宽度按原图比例自动算（需 Pillow）
  embed_screenshot_max_width: 300
  embed_screenshot_max_height: 180
  # 无截图时的数据行高（Excel 磅）
  data_row_height: 24
  # 单次运行截图文件总字节上限（超出则跳过后续截图，仍完成 URL 检测）；0 不限制
  max_total_screenshot_bytes: 100000000
